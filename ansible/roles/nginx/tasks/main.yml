- name: Install nginx
  package:
    name: nginx
    state: present

    
- name: Write index.html
  copy: 
    dest: /usr/share/nginx/html/index.html
    content: "Hello from Ansible\n"
  notify: Restart nginx

- name: Render nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify: Restart nginx

- name: Ensure nginx is running
  service:
    name: nginx
    state: started
    enabled: true